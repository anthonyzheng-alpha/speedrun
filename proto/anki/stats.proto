syntax = "proto3";

option java_multiple_files = true;

package anki.stats;

import "anki/generic.proto";
import "anki/cards.proto";

service StatsService {
  rpc CardStats(cards.CardId) returns (CardStatsResponse);
  rpc GetReviewLogs(cards.CardId) returns (ReviewLogs);
  rpc Graphs(GraphsRequest) returns (GraphsResponse);
  rpc GetGraphPreferences(generic.Empty) returns (GraphPreferences);
  rpc SetGraphPreferences(GraphPreferences) returns (generic.Empty);
  // How much of the MCAT exam has been studied, overall and per section.
  rpc ExamCoverage(generic.Empty) returns (ExamCoverageResponse);
  // Global performance + readiness metrics, overall and per section.
  rpc ExamMetrics(generic.Empty) returns (ExamMetricsResponse);
  // Persist the result of a completed practice exam so it can feed the
  // performance/readiness metrics.
  rpc RecordPracticeExam(RecordPracticeExamRequest) returns (generic.Empty);
}

// Implicitly includes any of the above methods that are not listed in the
// backend service.
service BackendStatsService {}

message ReviewLogs {
  repeated CardStatsResponse.StatsRevlogEntry entries = 1;
}

message CardStatsResponse {
  message StatsRevlogEntry {
    int64 time = 1;
    RevlogEntry.ReviewKind review_kind = 2;
    uint32 button_chosen = 3;
    // seconds
    uint32 interval = 4;
    // per mill
    uint32 ease = 5;
    float taken_secs = 6;
    optional cards.FsrsMemoryState memory_state = 7;
    // seconds
    uint32 last_interval = 8;
  }
  repeated StatsRevlogEntry revlog = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  string deck = 4;
  // Unix timestamps
  int64 added = 5;
  optional int64 first_review = 6;
  optional int64 latest_review = 7;
  optional int64 due_date = 8;
  optional int32 due_position = 9;
  // days
  uint32 interval = 10;
  // per mill
  uint32 ease = 11;
  uint32 reviews = 12;
  uint32 lapses = 13;
  float average_secs = 14;
  float total_secs = 15;
  string card_type = 16;
  string notetype = 17;
  optional cards.FsrsMemoryState memory_state = 18;
  // not set if due date/state not available
  optional float fsrs_retrievability = 19;
  string custom_data = 20;
  string preset = 21;
  optional string original_deck = 22;
  optional float desired_retention = 23;
  repeated float fsrs_params = 24;
  // The memory model's estimate of the chance the user recalls this fact.
  optional CardMemoryEstimate memory_estimate = 25;
}

// Memory model output for a single card: the estimated chance (0-100) the user
// recalls the fact, with an honesty envelope (range + confidence) derived from
// how much review history backs the estimate.
message CardMemoryEstimate {
  // False when there isn't enough review history to state a number
  // confidently; in that case the numeric fields are unset and only
  // `justification` is meaningful.
  bool has_enough_data = 1;
  // Point estimate of recall chance, 0-100.
  float score = 2;
  // Lower bound of the plausible range, 0-100.
  float range_min = 3;
  // Upper bound of the plausible range, 0-100.
  float range_max = 4;
  // How confident the estimate is, 0-100 (wider range -> lower confidence).
  float confidence = 5;
  // Unix timestamp (seconds) of the last review the estimate is based on.
  int64 last_updated = 6;
  // Short human-readable explanation of the estimate.
  string justification = 7;
}

// Progress through the MCAT exam, expressed as the share of topics that have
// been fully studied (every card in the topic mastered), broken down by the
// exam's scored sections.
message ExamCoverageResponse {
  message SectionCoverage {
    // Section deck name, e.g. "Biology & Biochemistry".
    string section = 1;
    // Topics in this section that have at least one card in the collection.
    uint32 topics_total = 2;
    // Of those, how many are fully covered (all their cards mastered).
    uint32 topics_covered = 3;
    // topics_covered / topics_total * 100, or 0 when there are no topics.
    float percent = 4;
  }
  repeated SectionCoverage sections = 1;
  // Covered topics across all sections divided by total topics, as a percent.
  float overall_percent = 2;
  uint32 topics_total = 3;
  uint32 topics_covered = 4;
}

// A single metric estimate with an honesty envelope, shared by the
// performance and readiness metrics (and shaped like CardMemoryEstimate).
message MetricEstimate {
  // False when there isn't enough data (flashcard reviews + practice-exam
  // questions) to state a number confidently; then only `justification` is
  // meaningful.
  bool has_enough_data = 1;
  // Point estimate. For performance this is a 0-100 percentage; for readiness
  // it is a projected MCAT score.
  float score = 2;
  // Lower bound of the plausible range, same units as `score`.
  float range_min = 3;
  // Upper bound of the plausible range, same units as `score`.
  float range_max = 4;
  // How confident the estimate is, 0-100 (wider range -> lower confidence).
  float confidence = 5;
  // Unix timestamp (seconds) of the most recent input the estimate is based on.
  int64 last_updated = 6;
  // Short human-readable explanation of the estimate.
  string justification = 7;
}

// A per-section metric estimate.
message SectionMetric {
  // Section label, e.g. "Biology & Biochemistry".
  string section = 1;
  MetricEstimate estimate = 2;
}

// Global performance and readiness metrics. Performance is the estimated
// chance (0-100) of answering a new exam-style question correctly; readiness
// is the projected MCAT score. Neither is card-specific; both are influenced
// by flashcard review history and practice-exam results (exams weigh more).
message ExamMetricsResponse {
  MetricEstimate performance_overall = 1;
  repeated SectionMetric performance_sections = 2;
  MetricEstimate readiness_overall = 3;
  repeated SectionMetric readiness_sections = 4;
}

// The outcome of a completed practice exam, broken down by topic.
message RecordPracticeExamRequest {
  message TopicResult {
    // Practice-exam topic key, e.g. "biology_biochemistry".
    string topic = 1;
    uint32 correct = 2;
    uint32 total = 3;
  }
  repeated TopicResult results = 1;
  // Unix timestamp (seconds) the exam was completed; 0 means "now".
  int64 timestamp = 2;
}

message GraphsRequest {
  string search = 1;
  uint32 days = 2;
}

message GraphsResponse {
  message Added {
    map<int32, uint32> added = 1;
  }
  message Intervals {
    map<uint32, uint32> intervals = 1;
  }
  message Eases {
    map<uint32, uint32> eases = 1;
    float average = 2;
  }
  message Retrievability {
    map<uint32, uint32> retrievability = 1;
    float average = 2;
    float sum_by_card = 3;
    float sum_by_note = 4;
  }
  message FutureDue {
    map<int32, uint32> future_due = 1;
    bool have_backlog = 2;
    uint32 daily_load = 3;
  }
  message Today {
    uint32 answer_count = 1;
    uint32 answer_millis = 2;
    uint32 correct_count = 3;
    uint32 mature_correct = 4;
    uint32 mature_count = 5;
    uint32 learn_count = 6;
    uint32 review_count = 7;
    uint32 relearn_count = 8;
    uint32 early_review_count = 9;
  }
  // each bucket is a 24 element vec
  message Hours {
    message Hour {
      uint32 total = 1;
      uint32 correct = 2;
    }
    repeated Hour one_month = 1;
    repeated Hour three_months = 2;
    repeated Hour one_year = 3;
    repeated Hour all_time = 4;
  }
  message ReviewCountsAndTimes {
    message Reviews {
      uint32 learn = 1;
      uint32 relearn = 2;
      uint32 young = 3;
      uint32 mature = 4;
      uint32 filtered = 5;
    }
    map<int32, Reviews> count = 1;
    map<int32, Reviews> time = 2;
  }
  // 4 element vecs for buttons 1-4
  message Buttons {
    message ButtonCounts {
      repeated uint32 learning = 1;
      repeated uint32 young = 2;
      repeated uint32 mature = 3;
    }
    ButtonCounts one_month = 1;
    ButtonCounts three_months = 2;
    ButtonCounts one_year = 3;
    ButtonCounts all_time = 4;
  }
  message CardCounts {
    message Counts {
      uint32 newCards = 1;
      uint32 learn = 2;
      uint32 relearn = 3;
      uint32 young = 4;
      uint32 mature = 5;
      uint32 suspended = 6;
      uint32 buried = 7;
    }
    // Buried/suspended cards are included in counts; suspended/buried counts
    // are 0.
    Counts including_inactive = 1;
    // Buried/suspended cards are counted separately.
    Counts excluding_inactive = 2;
  }
  message TrueRetentionStats {
    message TrueRetention {
      uint32 young_passed = 1;
      uint32 young_failed = 2;
      uint32 mature_passed = 3;
      uint32 mature_failed = 4;
    }

    TrueRetention today = 1;
    TrueRetention yesterday = 2;
    TrueRetention week = 3;
    TrueRetention month = 4;
    TrueRetention year = 5;
    TrueRetention all_time = 6;
  }

  Buttons buttons = 1;
  CardCounts card_counts = 2;
  Hours hours = 3;
  Today today = 4;
  Eases eases = 5;
  Eases difficulty = 11;
  Intervals intervals = 6;
  FutureDue future_due = 7;
  Added added = 8;
  ReviewCountsAndTimes reviews = 9;
  uint32 rollover_hour = 10;
  Retrievability retrievability = 12;
  bool fsrs = 13;
  Intervals stability = 14;
  TrueRetentionStats true_retention = 15;
}

message GraphPreferences {
  enum Weekday {
    SUNDAY = 0;
    MONDAY = 1;
    FRIDAY = 5;
    SATURDAY = 6;
  }
  Weekday calendar_first_day_of_week = 1;
  bool card_counts_separate_inactive = 2;
  bool browser_links_supported = 3;
  bool future_due_show_backlog = 4;
}

message RevlogEntry {
  enum ReviewKind {
    LEARNING = 0;
    REVIEW = 1;
    RELEARNING = 2;
    FILTERED = 3;
    MANUAL = 4;
    RESCHEDULED = 5;
  }
  int64 id = 1;
  int64 cid = 2;
  int32 usn = 3;
  uint32 button_chosen = 4;
  int32 interval = 5;
  int32 last_interval = 6;
  uint32 ease_factor = 7;
  uint32 taken_millis = 8;
  ReviewKind review_kind = 9;
}

message CardEntry {
  int64 id = 1;
  int64 note_id = 2;
  int64 deck_id = 3;
}

message DeckEntry {
  int64 id = 1;
  int64 parent_id = 2;
  int64 preset_id = 3;
}

message Dataset {
  repeated RevlogEntry revlogs = 1;
  repeated CardEntry cards = 2;
  repeated DeckEntry decks = 3;
  int64 next_day_at = 4;
}
